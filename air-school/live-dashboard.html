<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Air Quality Data</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #1e293b; padding: 1.5rem; }
        .status { text-align: center; color: #64748b; margin-bottom: 1rem; font-size: 0.85rem; }
        .status.error { color: #ef4444; }
        .metric-selector { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .metric-btn { padding: 0.4rem 1rem; border: 1px solid #cbd5e1; border-radius: 20px; background: white; cursor: pointer; font-size: 0.8rem; font-family: 'Inter', sans-serif; transition: all 0.2s; }
        .metric-btn.active { background: #2e7d32; color: white; border-color: #2e7d32; }
        .chart-container { max-width: 900px; margin: 0 auto 2rem; background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .chart-container canvas { max-height: 300px; }
        .data-table { max-width: 900px; margin: 0 auto; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        th { background: #2e7d32; color: white; padding: 0.75rem; text-align: left; font-weight: 500; }
        td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f1f5f9; }
        tr:hover { background: #f8fafc; }
        .alert-box { max-width: 900px; margin: 0 auto 1rem; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; }
        .alert-info { background: #f0fdf4; border-left: 3px solid #2e7d32; color: #166534; }
        .alert-warn { background: #fff3cd; border-left: 5px solid #ffc107; color: #92400e; }
        .alert-danger { background: #fef2f2; border-left: 5px solid #ef4444; color: #991b1b; }
        .guide-box { max-width: 900px; margin: 0 auto 1rem; padding: 1rem 1.25rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.85rem; line-height: 1.6; color: #475569; }
        .guide-box strong { color: #1e293b; }
    </style>
</head>
<body>
    <p class="status" id="status" data-i18n="liveData.loading">Loading sensor data...</p>
    <div class="alert-box alert-info" id="safetyAlert" style="display:none;"></div>
    <div class="guide-box" id="guideBox" style="display:none;"></div>
    <div class="metric-selector" id="metricSelector"></div>
    <div class="chart-container"><canvas id="chart"></canvas></div>
    <div class="data-table"><table id="dataTable"><thead></thead><tbody></tbody></table></div>

    <script>
        const PROXY_URL = 'https://gzbuvywxrzcovqohmbol.supabase.co/functions/v1/get-sensor-data';
        let rows = [];
        let chart = null;
        let selectedMetric = 'pm25';

        // i18n helper: returns translated string or fallback
        function t(key, fallback) {
            if (typeof i18n !== 'undefined' && i18n.t) {
                const val = i18n.t(key);
                return (val && val !== key) ? val : fallback;
            }
            return fallback;
        }

        function getMetrics() {
            return [
                { key: 'pm25', label: t('liveData.metrics.pm25.label', 'PM2.5'), unit: t('liveData.metrics.pm25.unit', 'ug/m3') },
                { key: 'co2', label: t('liveData.metrics.co2.label', 'CO2'), unit: t('liveData.metrics.co2.unit', 'ppm') },
                { key: 'temp', label: t('liveData.metrics.temp.label', 'Temperature'), unit: t('liveData.metrics.temp.unit', '°C') },
                { key: 'humidity', label: t('liveData.metrics.humidity.label', 'Humidity'), unit: t('liveData.metrics.humidity.unit', '%') },
                { key: 'pm10', label: t('liveData.metrics.pm10.label', 'PM1.0'), unit: t('liveData.metrics.pm10.unit', 'ug/m3') },
                { key: 'pm100', label: t('liveData.metrics.pm100.label', 'PM10.0'), unit: t('liveData.metrics.pm100.unit', 'ug/m3') },
                { key: 'co', label: t('liveData.metrics.co.label', 'CO'), unit: t('liveData.metrics.co.unit', 'ppm') },
                { key: 'no2', label: t('liveData.metrics.no2.label', 'NO2'), unit: t('liveData.metrics.no2.unit', 'ppm') },
                { key: 'voc', label: t('liveData.metrics.voc.label', 'VOC'), unit: t('liveData.metrics.voc.unit', 'index') },
            ];
        }

        // Keep METRICS as a getter for backward compat
        let METRICS = getMetrics();

        const THRESHOLDS = {
            co2: { warn: 1000, danger: 2000 },
            pm25: { warn: 15, danger: 35 },
            pm100: { warn: null, danger: 45 },
            co: { warn: null, danger: 9 },
        };

        function getGuides() {
            return {
                pm25: { title: t('liveData.guides.pm25.title', 'PM2.5 (Fine Particles)'), text: t('liveData.guides.pm25.text', 'These tiny particles reach deep into the lungs and bloodstream. Can trigger <strong>asthma attacks</strong> and increase cardiovascular risk.<br><br><strong>WHO Guidelines:</strong><br>• 0-15 µg/m³: Good<br>• >35 µg/m³: Unhealthy') },
                pm10: { title: t('liveData.guides.pm10.title', 'PM1.0 (Ultrafine Particles)'), text: t('liveData.guides.pm10.text', 'Derived from combustion (engines, smoke). No official limit, but high levels are linked to systemic inflammation as they bypass lung barriers entirely.') },
                pm100: { title: t('liveData.guides.pm100.title', 'PM10.0 (Coarse Particles)'), text: t('liveData.guides.pm100.text', 'Mostly dust, pollen, and mold. Causes throat irritation, sneezing, and upper respiratory discomfort.<br><br><strong>WHO Guidelines:</strong><br>• 0-45 µg/m³: Acceptable<br>• >45 µg/m³: High') },
                co2: { title: t('liveData.guides.co2.title', 'CO₂ (Carbon Dioxide)'), text: t('liveData.guides.co2.text', '• 400-1000 ppm: Good<br>• 1000-2000 ppm: Drowsiness and poor concentration<br>• >2000 ppm: Headaches and stuffiness. May even affect your test scores.') },
                temp: { title: t('liveData.guides.temp.title', 'Temperature'), text: t('liveData.guides.temp.text', 'Ideal indoor range: 20-24°C (68-75°F). Extreme temperatures affect productivity and can exacerbate existing respiratory conditions.') },
                humidity: { title: t('liveData.guides.humidity.title', 'Humidity'), text: t('liveData.guides.humidity.text', 'Ideal range: 30-50%.<br>High humidity (>60%) promotes <strong>mold growth</strong> and dust mites.<br>Low humidity (<30%) causes dry skin and increases viral transmission.') },
                co: { title: t('liveData.guides.co.title', 'Carbon Monoxide (CO)'), text: t('liveData.guides.co.text', 'A colorless, odorless toxic gas. High levels indicate faulty heating systems or vehicle exhaust infiltration. Can cause dizziness and, at high levels, is fatal.') },
                no2: { title: t('liveData.guides.no2.title', 'Nitrogen Dioxide (NO₂)'), text: t('liveData.guides.no2.text', 'Primarily from traffic exhaust. Known to inflame the airways and is a major trigger for <strong>chronic bronchitis</strong> and asthma exacerbations.') },
                voc: { title: t('liveData.guides.voc.title', 'VOC Index (Volatile Organic Compounds)'), text: t('liveData.guides.voc.text', 'Gasses emitted from paints, markers, and new furniture. High levels cause "Sick Building Syndrome" — headaches, nausea, and eye irritation.') },
            };
        }

        let GUIDES = getGuides();

        function getValue(row, key) {
            const d = row.data || {};
            const map = {
                pm25: () => d.sen6x?.pm25 ?? d.hm3301?.pm2_5_std,
                pm10: () => d.sen6x?.pm10,
                pm40: () => d.sen6x?.pm40,
                pm100: () => d.sen6x?.pm100,
                temp: () => d.sen6x?.temp ?? d.sht_30?.temperature_celsius ?? d.qmp_6988?.temperature_celsius,
                humidity: () => d.sen6x?.humidity ?? d.sht_30?.humidity_percent,
                co2: () => d.sen6x?.co2,
                co: () => d.mgs?.co,
                no2: () => d.mgs?.no2,
                voc: () => d.mgs?.voc,
            };
            const fn = map[key];
            return fn ? fn() : null;
        }

        async function fetchData() {
            try {
                const resp = await fetch(PROXY_URL);
                if (!resp.ok) throw new Error('API error');
                rows = await resp.json();
                METRICS = getMetrics();
                GUIDES = getGuides();
                const loadedText = t('liveData.readingsLoaded', '{count} readings loaded').replace('{count}', rows.length);
                document.getElementById('status').textContent = loadedText;
                renderMetricButtons();
                render();
            } catch (err) {
                document.getElementById('status').textContent = t('liveData.failedToLoad', 'Failed to load data');
                document.getElementById('status').classList.add('error');
            }
        }

        function renderMetricButtons() {
            const el = document.getElementById('metricSelector');
            el.innerHTML = METRICS.map(m =>
                `<button class="metric-btn ${m.key === selectedMetric ? 'active' : ''}" onclick="selectMetric('${m.key}')">${m.label}</button>`
            ).join('');
        }

        function selectMetric(key) {
            selectedMetric = key;
            renderMetricButtons();
            render();
        }

        function render() {
            renderChart();
            renderTable();
            renderAlert();
        }

        function getAnnotations() {
            const a = {};
            if (selectedMetric === 'co2') {
                a.line1 = { type: 'line', yMin: 1000, yMax: 1000, borderColor: '#ffc107', borderWidth: 2, borderDash: [6, 6], label: { display: true, content: t('liveData.annotations.ventilate', 'Ventilate'), position: 'end', font: { size: 10 } } };
                a.line2 = { type: 'line', yMin: 2000, yMax: 2000, borderColor: '#dc3545', borderWidth: 2, borderDash: [6, 6], label: { display: true, content: t('liveData.annotations.critical', 'Critical'), position: 'end', font: { size: 10 } } };
            } else if (selectedMetric === 'pm25') {
                a.line1 = { type: 'line', yMin: 15, yMax: 15, borderColor: '#ffc107', borderWidth: 1.5, borderDash: [4, 4], label: { display: true, content: t('liveData.annotations.whoLimit', 'WHO Limit'), position: 'end', font: { size: 9 } } };
                a.line2 = { type: 'line', yMin: 35, yMax: 35, borderColor: '#dc3545', borderWidth: 2, borderDash: [4, 4], label: { display: true, content: t('liveData.annotations.unhealthy', 'Unhealthy'), position: 'end', font: { size: 9 } } };
            } else if (selectedMetric === 'temp') {
                a.idealZone = { type: 'box', yMin: 20, yMax: 24, backgroundColor: 'rgba(0,123,255,0.05)', borderColor: 'rgba(0,123,255,0.2)', borderWidth: 1, label: { display: true, content: t('liveData.annotations.idealTempRange', 'Ideal Range (20-24°C)'), position: 'start', font: { size: 10, style: 'italic' }, color: '#666' } };
            } else if (selectedMetric === 'humidity') {
                a.idealZone = { type: 'box', yMin: 30, yMax: 50, backgroundColor: 'rgba(0,123,255,0.05)', borderColor: 'rgba(0,123,255,0.2)', borderWidth: 1, label: { display: true, content: t('liveData.annotations.idealHumidityRange', 'Ideal Humidity (30-50%)'), position: 'start', font: { size: 10, style: 'italic' }, color: '#666' } };
            }
            return a;
        }

        function renderChart() {
            const metric = METRICS.find(m => m.key === selectedMetric);
            const labels = rows.map(r => new Date(r.recorded_at).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }));
            const data = rows.map(r => getValue(r, selectedMetric));

            if (chart) chart.destroy();
            chart = new Chart(document.getElementById('chart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: `${metric.label} (${metric.unit})`,
                        data,
                        borderColor: '#2e7d32',
                        backgroundColor: 'rgba(46,125,50,0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 2,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        annotation: { annotations: getAnnotations() }
                    },
                    scales: {
                        x: { display: true, ticks: { maxTicksLimit: 10, font: { size: 10 } } },
                        y: { display: true, title: { display: true, text: metric.unit } }
                    }
                }
            });
        }

        function renderTable() {
            const metric = METRICS.find(m => m.key === selectedMetric);
            const thead = document.querySelector('#dataTable thead');
            thead.innerHTML = `<tr><th>${t('liveData.tableHeaders.time', 'Time')}</th><th>${t('liveData.tableHeaders.device', 'Device')}</th><th>${metric.label} (${metric.unit})</th></tr>`;
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = [...rows].reverse().slice(0, 50).map(r => {
                const val = getValue(r, selectedMetric);
                const th = THRESHOLDS[selectedMetric];
                const cls = th && val > (th.danger || Infinity) ? 'style="color:#ef4444;font-weight:600"' : '';
                return `<tr><td>${new Date(r.recorded_at).toLocaleString()}</td><td>${r.device_nickname || r.device_id}</td><td ${cls}>${val != null ? val : '—'}</td></tr>`;
            }).join('');
        }

        function renderAlert() {
            const el = document.getElementById('safetyAlert');
            const guideEl = document.getElementById('guideBox');
            const metric = METRICS.find(m => m.key === selectedMetric);
            const latest = rows.length ? getValue(rows[rows.length - 1], selectedMetric) : null;

            // Safety alert
            const th = THRESHOLDS[selectedMetric];
            if (th && latest != null) {
                if (th.danger && latest > th.danger) {
                    el.className = 'alert-box alert-danger';
                    const dangerText = t('liveData.alerts.aboveDanger', '{metric}: {value} {unit} — above danger threshold ({threshold})')
                        .replace('{metric}', metric.label).replace('{value}', latest).replace('{unit}', metric.unit).replace('{threshold}', th.danger);
                    el.innerHTML = `<strong>${dangerText}</strong>`;
                } else if (th.warn && latest > th.warn) {
                    el.className = 'alert-box alert-warn';
                    const warnText = t('liveData.alerts.aboveWarning', '{metric}: {value} {unit} — above warning threshold ({threshold})')
                        .replace('{metric}', metric.label).replace('{value}', latest).replace('{unit}', metric.unit).replace('{threshold}', th.warn);
                    el.innerHTML = `<strong>${warnText}</strong>`;
                } else {
                    el.className = 'alert-box alert-info';
                    const safeText = t('liveData.alerts.withinSafe', '{metric}: {value} {unit} — within safe levels')
                        .replace('{metric}', metric.label).replace('{value}', latest).replace('{unit}', metric.unit);
                    el.innerHTML = `<strong>${safeText}</strong>`;
                }
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }

            // Health guidance
            const guide = GUIDES[selectedMetric];
            if (guide) {
                guideEl.innerHTML = `<strong>${guide.title}</strong><br>${guide.text}`;
                guideEl.style.display = 'block';
            } else {
                guideEl.style.display = 'none';
            }
        }

        fetchData();
        setInterval(fetchData, 30000);
    </script>
    <script src="/assets/js/i18n.js"></script>
</body>
</html>
